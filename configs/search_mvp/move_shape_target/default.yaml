profile: move_shape_target

source:
  source_size: 64
  initialization:
    mode: mixed_blobs
    patch_size_fraction: [0.28, 0.55]
    patch_density_scale: 0.65
    patch_density_bias: 0.0
    blob_count: [2, 5]
    shell_probability: 0.35
    noise_amplitude: 0.04
  rule_randomization:
    enabled: true
    probability: 1.0
    ring_count_probability: 0.8
    ring_count_choices: [2, 3, 4, 5, 6]
    kn_probability: 0.5
    kn_choices: [1, 2, 3, 4]
    gn_probability: 0.0
    gn_choices: [1]
    R_probability: 1.0
    R_log_std: 0.08
    m_probability: 1.0
    m_std: 0.02
    s_probability: 1.0
    s_log_std: 0.20
    b_probability: 1.0
    b_element_probability: 1.0
    b_std: 0.06
    T_probability: 0.4
    T_log_std: 0.10

simulation:
  size: 128
  steps: 50

evaluation:
  continuation_steps: [100, 200, 500]
  stop_on_first_failure: true

search:
  iterations: 160
  random_init_count: 40
  source_selection: top_weighted
  source_selection_config:
    top_k: 12
    temperature: 6.0
    score_field: score_100
  source_injection:
    enabled: true
    every_iterations: 10
    start_after_initial_pool: true
    max_injections: 16
  mutation_std: null
  mutation:
    probability: 0.75
    no_mutation_every_iterations: 5
    mutated_inner_optim_steps: 25
    initial_logit_probability: 0.70
    initial_logit_std: 0.02
    precheck:
      enabled: true
      steps: 50
      max_attempts: 4
      accept_first_life_gate_pass: true
    rule:
      enabled: true
      probability: 0.60
      R_probability: 0.25
      R_log_std: 0.05
      m_probability: 0.70
      m_std: 0.01
      s_probability: 0.70
      s_log_std: 0.10
      b_probability: 0.50
      b_element_probability: 0.50
      b_std: 0.03
      T_probability: 0.0
      T_log_std: 0.0
  seed: 0
  debug_allow_size_32: false

optimization:
  inner_optim_steps: 125
  train_clip_mode: straight_through_hard
  eval_clip_mode: hard
  optimize_params: [m, s]
  compile_step: true
  optimizer:
    name: Adam
    lr: 0.08
    initial_lr: 0.008
    param_lr: 0.0008
    max_grad_norm: null

objective:
  gate_fail_score_cap: 5.0
  eval_gates:
    min_max_density: 0.08
    mass_fraction: [0.0001, 0.06]
    active_fraction: [0.0005, 0.12]
    active_body_radius_norm: [0.02, 0.42]
    max_border_mass: 0.12
    topology:
      enabled: true
      allowed: [blob, cylinder, plane]
      active_threshold: 0.05
      full_axis_span_min: 0.85
      compact_axis_span_max: 0.72
      compact_axis_border_mass_max: 0.18
      by_type:
        blob:
          mass_fraction: [0.0001, 0.06]
          active_fraction: [0.0005, 0.12]
          active_body_radius_norm: [0.02, 0.42]
          max_border_mass: 0.12
        cylinder:
          mass_fraction: [0.0001, 0.14]
          active_fraction: [0.0005, 0.24]
          compact_axis_span_norm: [0.01, 0.55]
          compact_axis_border_mass_max: 0.18
        plane:
          mass_fraction: [0.0001, 0.18]
          active_fraction: [0.0005, 0.35]
          compact_axis_span_norm: [0.01, 0.72]
          compact_axis_border_mass_max: 0.18
  target_offset_norm_zyx: [0.0, 0.0, 0.12]
  target_profile:
    mode: staged_offsets
    stages:
      - at_step_fraction: 0.5
        offset_norm_zyx: [0.0, 0.0, 0.06]
        weight_scale:
          com: 0.35
          balanced_target: 0.35
      - at_step_fraction: 1.0
        offset_norm_zyx: [0.0, 0.0, 0.12]
        weight_scale:
          com: 1.0
          balanced_target: 1.0
  target_radius_norm: 0.08
  target_density: 0.8
  target_falloff_floor: 0.25
  anisotropy_max: 8.0
  min_active_fraction_soft: 0.01
  min_max_density: 0.08
  weights:
    com: 8.0
    balanced_target: 4.0
    target_mask: 0.0
    absolute_occupancy: 35.0
    mass_ratio: 8.0
    active_ratio: 6.0
    compactness_ratio: 5.0
    anisotropy: 0.2
    border: 6.0
    visibility: 20.0
  windows:
    mass_ratio: [0.35, 1.6]
    active_ratio: [0.25, 1.5]
    compactness_ratio: [0.25, 1.8]
    mass_fraction: [0.0001, 0.06]
    active_fraction: [0.0005, 0.12]

export:
  out: outputs/search_mvp/move_sthard_128_test
  export_top_k: 3
  save_initial_states: true
  checkpoint_every_iterations: 5
  best_every_iterations: 1

logging:
  inner_log_every: 5
  detailed_terms_every: 25
