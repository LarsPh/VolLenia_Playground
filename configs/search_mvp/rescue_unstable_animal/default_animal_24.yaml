profile: rescue_unstable_animal

source:
  catalog: configs/lenia3d_reference/animals.json
  animal: stylomembranome_limus
  initialization:
    mode: blob_shell
    patch_size_fraction: [0.28, 0.55]
    patch_density_scale: 0.65
    patch_density_bias: 0.0
    blob_count: [2, 5]
    shell_probability: 0.35
    noise_amplitude: 0.04
  rule_randomization:
    enabled: true
    probability: 1.0
    ring_count_probability: 0.0
    ring_count_choices: []
    kn_probability: 0.0
    kn_choices: []
    gn_probability: 0.0
    gn_choices: []
    R_probability: 1.0
    R_log_std: 0.12
    m_probability: 1.0
    m_std: 0.02
    s_probability: 1.0
    s_log_std: 0.16
    b_probability: 0.0
    b_element_probability: 1.0
    b_std: 0.0
    T_probability: 0.0
    T_log_std: 0.0

simulation:
  size: 128
  steps: 50

evaluation:
  continuation_steps: [100, 200, 500, 1000, 2000]
  stop_on_first_failure: true

search:
  iterations: 24
  random_init_count: 8
  source_selection: top_weighted
  source_selection_config:
    top_k: 12
    temperature: 8.0
    score_field: score_100
  source_injection:
    enabled: false
    every_iterations: 10
    start_after_initial_pool: true
    max_injections: 0
  mutation_std: null
  mutation:
    probability: 0.75
    no_mutation_every_iterations: 5
    mutated_inner_optim_steps: 60
    initial_logit_probability: 0.60
    initial_logit_std: 0.012
    precheck:
      enabled: true
      steps: 50
      max_attempts: 4
      accept_first_life_gate_pass: true
    rule:
      enabled: true
      probability: 0.75
      R_probability: 0.60
      R_log_std: 0.08
      m_probability: 0.85
      m_std: 0.012
      s_probability: 0.85
      s_log_std: 0.12
      b_probability: 0.0
      b_element_probability: 0.0
      b_std: 0.0
      T_probability: 0.0
      T_log_std: 0.0
  seed: 0
  debug_allow_size_32: false

optimization:
  inner_optim_steps: 250
  train_clip_mode: straight_through_hard
  eval_clip_mode: hard
  optimize_params: [m, s]
  compile_step: false
  optimizer:
    name: Adam
    lr: 0.08
    initial_lr: 0.002
    param_lr: 0.0005
    max_grad_norm: null

objective:
  gate_fail_score_cap: 5.0
  eval_gates:
    min_max_density: 0.08
    mass_fraction: [0.00005, 0.08]
    active_fraction: [0.0002, 0.16]
    active_body_radius_norm: [0.015, 0.45]
    max_border_mass: 0.15
    topology:
      enabled: true
      allowed: [blob, cylinder, plane]
      active_threshold: 0.05
      full_axis_span_min: 0.85
      compact_axis_span_max: 0.72
      compact_axis_border_mass_max: 0.18
      by_type:
        blob:
          mass_fraction: [0.00005, 0.08]
          active_fraction: [0.0002, 0.16]
          active_body_radius_norm: [0.015, 0.45]
          max_border_mass: 0.15
        cylinder:
          mass_fraction: [0.00005, 0.14]
          active_fraction: [0.0002, 0.24]
          compact_axis_span_norm: [0.01, 0.55]
          compact_axis_border_mass_max: 0.18
        plane:
          mass_fraction: [0.00005, 0.18]
          active_fraction: [0.0002, 0.35]
          compact_axis_span_norm: [0.01, 0.72]
          compact_axis_border_mass_max: 0.18
  anisotropy_max: 10.0
  min_active_fraction_soft: 0.01
  min_max_density: 0.08
  weights:
    mass_ratio: 25.0
    active_ratio: 10.0
    absolute_occupancy: 8.0
    compactness_ratio: 5.0
    anisotropy: 0.25
    border: 2.0
    visibility: 8.0
  windows:
    mass_ratio: [0.4, 2.2]
    active_ratio: [0.3, 2.5]
    mass_fraction: [0.00005, 0.18]
    active_fraction: [0.0002, 0.35]
    compactness_ratio: [0.35, 3.0]

export:
  out: outputs/search_mvp/rescue_animal24_probe
  export_top_k: 3
  save_initial_states: true
  checkpoint_every_iterations: 5
  best_every_iterations: 1

logging:
  inner_log_every: 5
  detailed_terms_every: 25
