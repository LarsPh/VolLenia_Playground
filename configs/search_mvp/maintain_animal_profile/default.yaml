profile: maintain_animal_profile

source:
  catalog: configs/lenia3d_reference/animals.json
  animal: Diguttome
  rule_randomization:
    enabled: false
    probability: 1.0
    ring_count_probability: 0.0
    ring_count_choices: []
    kn_probability: 0.0
    kn_choices: []
    gn_probability: 0.0
    gn_choices: []
    R_probability: 1.0
    R_log_std: 0.0
    m_probability: 1.0
    m_std: 0.0
    s_probability: 1.0
    s_log_std: 0.0
    b_probability: 1.0
    b_element_probability: 1.0
    b_std: 0.0
    T_probability: 1.0
    T_log_std: 0.0

simulation:
  size: 128
  steps: 50

search:
  iterations: 160
  random_init_count: 1
  source_selection: best
  mutation_std: null
  mutation:
    probability: 0.50
    no_mutation_every_iterations: 4
    mutated_inner_optim_steps: 25
    initial_logit_probability: 0.50
    initial_logit_std: 0.015
    rule:
      enabled: true
      probability: 0.50
      R_probability: 0.0
      R_log_std: 0.0
      m_probability: 0.70
      m_std: 0.005
      s_probability: 0.70
      s_log_std: 0.05
      b_probability: 0.0
      b_element_probability: 0.0
      b_std: 0.0
      T_probability: 0.0
      T_log_std: 0.0
  seed: 0
  debug_allow_size_32: false

optimization:
  inner_optim_steps: 125
  train_clip_mode: straight_through_hard
  eval_clip_mode: hard
  optimize_params: [m, s]
  compile_step: false
  optimizer:
    name: Adam
    lr: 0.08
    initial_lr: null
    param_lr: null
    max_grad_norm: null

objective:
  anisotropy_max: 10.0
  min_active_fraction_soft: 0.01
  min_max_density: 0.08
  weights:
    mass_ratio: 25.0
    active_ratio: 10.0
    compactness_ratio: 5.0
    anisotropy: 0.25
    border: 2.0
    visibility: 8.0
  windows:
    mass_ratio: [0.4, 2.2]
    active_ratio: [0.3, 2.5]
    compactness_ratio: [0.35, 3.0]

export:
  out: outputs/search_mvp/maintain_animal_profile_default
  export_top_k: 3
  save_initial_states: true
  checkpoint_every_iterations: 5
  best_every_iterations: 1
